name: 보안 릴리스 워크플로우 (Secure Release Workflow)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 보안 게이트 - 모든 보안 검사 통과 필수
  security-gate:
    name: 보안 게이트 (Security Gate)
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks - 시크릿 스캔
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep - SAST 스캔
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/dockerfile
          generateSarif: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Semgrep SARIF 업로드
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Bandit - Python 보안 스캔
        run: |
          pip install bandit[toml]
          bandit -r apps/api/src -f json -o bandit-report.json || true
          bandit -r apps/api/src

      - name: Trivy - 의존성 스캔
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy SARIF 업로드
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # 빌드 및 푸시 - 멀티 플랫폼 이미지
  build-and-push:
    name: 이미지 빌드 및 푸시 (Build & Push Image)
    runs-on: ubuntu-latest
    needs: security-gate
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: GHCR 로그인 (OIDC)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-

      - name: 이미지 빌드 및 푸시
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Cosign 설치
        uses: sigstore/cosign-installer@v3

      - name: 이미지 서명 (Cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          echo "이미지 다이제스트: ${DIGEST}"
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}

      - name: SBOM 생성 (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: SBOM 아티팩트 업로드
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # GitHub 릴리스 생성
  create-release:
    name: GitHub 릴리스 생성 (Create GitHub Release)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SBOM 다운로드
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: ./artifacts

      - name: 릴리스 노트 생성
        id: release-notes
        run: |
          # 이전 태그 찾기
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 릴리스 노트 생성
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "첫 릴리스입니다." > release-notes.md
          else
            echo "## 변경 사항 (Changes)" > release-notes.md
            echo "" >> release-notes.md
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" >> release-notes.md
          fi

          # 이미지 정보 추가
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## 컨테이너 이미지 (Container Image)" >> release-notes.md
          echo "" >> release-notes.md
          echo '```' >> release-notes.md
          echo "docker pull ${{ needs.build-and-push.outputs.image-tag }}" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "**이미지 다이제스트:** \`${{ needs.build-and-push.outputs.image-digest }}\`" >> release-notes.md
          echo "" >> release-notes.md
          echo "**플랫폼:** linux/amd64, linux/arm64" >> release-notes.md
          echo "" >> release-notes.md
          echo "**서명 검증:**" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "cosign verify \\" >> release-notes.md
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}' \\" >> release-notes.md
          echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\" >> release-notes.md
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}" >> release-notes.md
          echo '```' >> release-notes.md

          cat release-notes.md

      - name: GitHub 릴리스 생성
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            ./artifacts/sbom.json
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 릴리스 완료 알림
        run: |
          echo "✅ 릴리스 완료: ${{ github.ref_name }}"
          echo "📦 이미지: ${{ needs.build-and-push.outputs.image-tag }}"
          echo "🔐 서명됨: cosign"
          echo "📋 SBOM: 첨부됨"
