name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 매주 월요일 오전 9시 (KST 기준)
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  secret-scan:
    name: 시크릿 스캔 (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks 스캔 실행
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Gitleaks 결과 업로드
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  sast-python:
    name: SAST - Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Bandit 설치
        run: |
          pip install bandit[sarif]==1.7.10

      - name: Bandit 스캔 실행
        run: |
          bandit -r apps/api/src \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --exit-zero

      - name: Bandit SARIF 업로드
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: 심각도 확인 및 실패 처리
        run: |
          # SARIF 파일에서 critical 발견 시 실패 (high는 경고만)
          CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' bandit-results.sarif)
          HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "warning")] | length' bandit-results.sarif)

          echo "Critical issues: $CRITICAL_COUNT"
          echo "High issues: $HIGH_COUNT"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Critical 보안 이슈가 발견되었습니다."
            exit 1
          fi

  sast-javascript:
    name: SAST - JavaScript/TypeScript (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Semgrep 스캔 실행
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/react \
            --config p/typescript \
            --config p/python \
            --sarif \
            --output semgrep.sarif \
            --error \
            . || true

      - name: Semgrep SARIF 업로드
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-scan:
    name: 의존성 스캔 (Trivy SCA)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: Python 의존성
            path: apps/api
            type: python
          - name: Node.js 의존성
            path: apps/web
            type: node
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Trivy 스캔 실행 - ${{ matrix.target.name }}
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: 'fs'
          scan-ref: ${{ matrix.target.path }}
          format: 'sarif'
          output: 'trivy-${{ matrix.target.type }}-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Trivy SARIF 업로드 - ${{ matrix.target.name }}
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.target.type }}-results.sarif'
          category: 'trivy-${{ matrix.target.type }}'

      - name: Trivy 스캔 실행 (테이블 형식) - ${{ matrix.target.name }}
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: 'fs'
          scan-ref: ${{ matrix.target.path }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  summary:
    name: 보안 스캔 요약
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-python, sast-javascript, dependency-scan]
    if: always()
    steps:
      - name: 스캔 결과 요약
        run: |
          echo "## 🔒 보안 스캔 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 스캔 유형 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 시크릿 스캔 (Gitleaks) | ${{ needs.secret-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST - Python (Bandit) | ${{ needs.sast-python.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST - JavaScript (Semgrep) | ${{ needs.sast-javascript.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 의존성 스캔 (Trivy) | ${{ needs.dependency-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "상세 결과는 Security 탭에서 확인하세요." >> $GITHUB_STEP_SUMMARY
